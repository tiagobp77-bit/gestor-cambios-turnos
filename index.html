<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayudantes CUC/PA - Gestión de Turnos</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'bounce-short': 'bounce 1s ease-in-out 3' }
                }
            }
        }
    </script>

    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIONES ---
        // Pega aquí la URL de tu Google Apps Script
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwy5ytZpGwvYYEfdpq8SXZlyuh7uNNjuVfHsw7cSyukPMDhwyyyMvsWeqisdpJZv8A/exec";
        
        const ALLOWED_EMAILS = [
            "admin@clinica.com",
            "medico1@gmail.com",
            "santiagobp.md@gmail.com" 
        ];

        const SHIFT_TYPES = {
            "Entre semana": ["AM", "PM"],
            "Fin de semana": ["Todo el día", "AM", "PM"],
            "Nocturnos": ["Noche"],
            "Disponibilidad": ["Disponibilidad AM", "Disponibilidad PM", "Disponibilidad Noche"]
        };

        const FALLBACK_DOCTORS = ["Dr. Juan Pérez (Respaldo)", "Dra. María Gómez (Respaldo)", "Dr. Carlos Ruiz (Respaldo)"];

        // --- ICONOS SVG ---
        const IconActivity = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconAlert = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconRefresh = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconUser = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconClock = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCalendar = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconChevronDown = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconSave = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const IconLogOut = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const IconFileText = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconUserCircle = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path></svg>;

        // --- COMPONENTES ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);
            const bgColor = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-teal-600');
            const Icon = type === 'error' || type === 'warning' ? IconAlert : IconCheck;
            return (
                <div className={`fixed bottom-4 right-4 ${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-2 animate-bounce-short z-50`}>
                    <Icon />
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const ShiftEntry = ({ shift, index, updateShift, removeShift, doctorsList, isLoadingDoctors }) => {
            const getTodayString = () => new Date().toISOString().split('T')[0];
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-4 transition-all hover:shadow-md">
                    <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-50">
                        <h4 className="font-semibold text-slate-700 flex items-center">
                            <span className="text-teal-500 mr-2"><IconActivity /></span>
                            Cambio de Turno #{index + 1}
                        </h4>
                        {index > 0 && (
                            <button onClick={() => removeShift(shift.id)} className="text-red-400 hover:text-red-600 p-1">
                                <IconTrash />
                            </button>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconUser /></span> Persona Asignada</label>
                            <div className="relative">
                                <select value={shift.person} onChange={(e) => updateShift(shift.id, 'person', e.target.value)} className="w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 appearance-none text-slate-700">
                                    <option value="">{isLoadingDoctors ? "Cargando..." : "Seleccione..."}</option>
                                    {doctorsList.map((doc, i) => <option key={i} value={doc}>{doc}</option>)}
                                </select>
                                <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></span>
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconClock /></span> Tipo de Jornada</label>
                            <div className="relative">
                                <select value={shift.type} onChange={(e) => updateShift(shift.id, 'type', e.target.value)} className="w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 appearance-none text-slate-700">
                                    <option value="">Seleccione jornada...</option>
                                    {Object.entries(SHIFT_TYPES).map(([cat, types]) => (
                                        <optgroup key={cat} label={cat}>
                                            {types.map(t => <option key={t} value={`${cat} - ${t}`}>{t}</option>)}
                                        </optgroup>
                                    ))}
                                </select>
                                <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></span>
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconCalendar /></span> Fecha del Turno</label>
                            <input type="date" min={getTodayString()} value={shift.date} onChange={(e) => updateShift(shift.id, 'date', e.target.value)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 text-slate-700" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [shifts, setShifts] = useState([{ id: '1', person: '', type: '', date: '' }]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [toast, setToast] = useState(null);
            const [history, setHistory] = useState([]);
            const [doctorsList, setDoctorsList] = useState([]);
            const [isLoadingDoctors, setIsLoadingDoctors] = useState(true);
            
            useEffect(() => {
                const fetchDoctors = async () => {
                    setIsLoadingDoctors(true);
                    try {
                        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDoctors`);
                        const result = await response.json();
                        if (result.status === 'success') {
                            setDoctorsList(result.data);
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (error) {
                        setDoctorsList(FALLBACK_DOCTORS);
                        setToast({ message: "Usando lista de médicos de respaldo temporalmente.", type: "warning" });
                    } finally {
                        setIsLoadingDoctors(false);
                    }
                };
                fetchDoctors();
            }, []);

            const handleLogin = () => {
                setIsLoggingIn(true);
                setTimeout(() => {
                    setUser({ name: "Dr. Administrador", email: "santiagobp.md@gmail.com", photoUrl: null });
                    setIsLoggingIn(false);
                }, 1000);
            };

            const handleLogout = () => { setUser(null); setShifts([{ id: '1', person: '', type: '', date: '' }]); };
            const addShift = () => setShifts([...shifts, { id: Date.now().toString(), person: '', type: '', date: '' }]);
            const removeShift = (id) => setShifts(shifts.filter(s => s.id !== id));
            const updateShift = (id, field, value) => setShifts(shifts.map(s => s.id === id ? { ...s, [field]: value } : s));

            const handleSubmit = async () => {
                const isValid = shifts.every(s => s.person && s.type && s.date);
                if (!isValid) return setToast({ message: "Completa todos los campos.", type: "error" });
                
                setIsSubmitting(true);
                try {
                    const payload = {
                        solicitante: user.name,
                        correoSolicitante: user.email,
                        cambios: shifts.map(s => ({ persona: s.person, jornada: s.type, fecha: s.date, timestamp: new Date().toISOString() }))
                    };
                    
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const newHistory = payload.cambios.map(c => ({...c, estado: 'Registrado', fechaRegistro: new Date().toLocaleDateString()}));
                    setHistory(prev => [...newHistory, ...prev]);
                    setToast({ message: "Solicitudes guardadas correctamente.", type: "success" });
                    setShifts([{ id: Date.now().toString(), person: '', type: '', date: '' }]); 
                } catch (error) {
                    setToast({ message: "Error al guardar.", type: "error" });
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
                            <div className="mx-auto w-16 h-16 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center mb-4"><IconActivity /></div>
                            <h2 className="text-3xl font-bold text-slate-800">Ayudantes CUC/PA</h2>
                            <p className="text-slate-500 mt-2 mb-8">Portal de Gestión de Turnos</p>
                            <button onClick={handleLogin} disabled={isLoggingIn} className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl font-medium text-white bg-teal-600 hover:bg-teal-700">
                                {isLoggingIn ? <IconRefresh className="animate-spin mr-2" /> : null}
                                {isLoggingIn ? "Conectando..." : "Ingresar"}
                            </button>
                        </div>
                        {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    </div>
                );
            }

            return (
                <div className="pb-10">
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="bg-teal-600 text-white p-2 rounded-lg"><IconActivity /></div>
                                <h1 className="text-xl font-bold text-slate-800 hidden sm:block">Gestión de Turnos</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="hidden md:block text-right"><p className="text-sm font-medium text-slate-700">{user.name}</p></div>
                                <div className="h-10 w-10 bg-teal-100 text-teal-700 rounded-full flex items-center justify-center"><IconUserCircle /></div>
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-600"><IconLogOut /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 mt-8 space-y-8">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-800 px-6 py-4 flex items-center"><span className="text-teal-400 mr-2"><IconFileText /></span><h2 className="text-lg font-semibold text-white">Nuevas Solicitudes</h2></div>
                            <div className="p-6 bg-slate-50">
                                {shifts.map((shift, idx) => <ShiftEntry key={shift.id} shift={shift} index={idx} updateShift={updateShift} removeShift={removeShift} doctorsList={doctorsList} isLoadingDoctors={isLoadingDoctors}/>)}
                                <div className="mt-4 flex flex-col sm:flex-row justify-between space-y-4 sm:space-y-0">
                                    <button onClick={addShift} className="flex items-center text-teal-600 font-medium px-4 py-2 border border-dashed border-teal-300 rounded-lg justify-center"><span className="mr-1"><IconPlus /></span> Agregar otro</button>
                                    <button onClick={handleSubmit} disabled={isSubmitting} className="flex items-center justify-center px-6 py-3 rounded-xl font-medium text-white bg-teal-600 hover:bg-teal-700">
                                        {isSubmitting ? <IconRefresh className="animate-spin mr-2" /> : <span className="mr-2"><IconSave /></span>} Guardar Solicitudes
                                    </button>
                                </div>
                            </div>
                        </section>

                        {history.length > 0 && (
                            <section>
                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><span className="text-slate-400 mr-2"><IconClock /></span> Mis Solicitudes</h3>
                                <div className="bg-white shadow-sm rounded-xl border border-slate-200 overflow-x-auto">
                                    <table className="min-w-full divide-y divide-slate-200">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Fecha Turno</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Profesional</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Jornada</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {history.map((entry, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50">
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{entry.fecha}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-700">{entry.persona}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{entry.jornada}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap"><span className="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">{entry.estado}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        )}
                    </main>
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
