        const generateColombianHolidays = (startYear, yearsAhead) => {
            let holidays = [];
            for (let year = startYear; year <= startYear + yearsAhead; year++) {
                const add = (m, d) => holidays.push(`${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
                add(1, 1); add(5, 1); add(7, 20); add(8, 7); add(12, 8); add(12, 25);
                const addEmiliani = (m, d) => {
                    let date = new Date(year, m - 1, d);
                    let day = date.getDay();
                    if (day !== 1) date.setDate(date.getDate() + (day === 0 ? 1 : 8 - day));
                    holidays.push(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`);
                };
                addEmiliani(1, 6); addEmiliani(3, 19); addEmiliani(6, 29); addEmiliani(8, 15); addEmiliani(10, 12); addEmiliani(11, 1); addEmiliani(11, 11);

                let a = year % 19, b = Math.floor(year / 100), c = year % 100, d = Math.floor(b / 4), e = b % 4;
                let f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
                let i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
                let m = Math.floor((a + 11 * h + 22 * l) / 451), month = Math.floor((h + l - 7 * m + 114) / 31) - 1, day = ((h + l - 7 * m + 114) % 31) + 1;
                let easter = new Date(year, month, day);
                const addDays = (date, days) => { let res = new Date(date); res.setDate(res.getDate() + days); return res; };
                const formatDate = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                const moveToMonday = (date) => { let dateDay = date.getDay(); if (dateDay !== 1) date.setDate(date.getDate() + (dateDay === 0 ? 1 : 8 - dateDay)); return formatDate(date); };

                holidays.push(formatDate(addDays(easter, -3))); holidays.push(formatDate(addDays(easter, -2)));
                holidays.push(moveToMonday(addDays(easter, 39))); holidays.push(moveToMonday(addDays(easter, 60))); holidays.push(moveToMonday(addDays(easter, 68)));
            }
            return holidays;
        };

        const currentYear = new Date().getFullYear();
        const HOLIDAYS = generateColombianHolidays(currentYear - 1, 50);

        const getDayType = (dateString) => {
            if (!dateString) return null;
            if (HOLIDAYS.includes(dateString)) return 'festivo';
            const d = new Date(dateString + 'T12:00:00');
            const day = d.getDay();
            if (day === 0) return 'domingo';
            if (day === 6) return 'sabado';
            return 'habil';
        };

        const IconSave = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;

        const IosInstallPrompt = () => {
            const [isIos, setIsIos] = useState(false);
            const [isStandalone, setIsStandalone] = useState(false);

            useEffect(() => {
                const userAgent = window.navigator.userAgent.toLowerCase();
                const isIosDevice = /iphone|ipad|ipod/.test(userAgent);
                setIsIos(isIosDevice);

                const isInstalled = ('standalone' in window.navigator) && window.navigator.standalone;
                setIsStandalone(isInstalled);
            }, []);

            if (!isIos || isStandalone) return null;

            return (
                <div style={{ position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)', backgroundColor: '#ffffff', padding: '16px', borderRadius: '12px', boxShadow: '0 8px 24px rgba(0,0,0,0.15)', zIndex: 9999, width: '90%', maxWidth: '350px', textAlign: 'center', border: '1px solid #e0e0e0' }}>

                    <p style={{ margin: 0, fontSize: '14px', color: '#555', lineHeight: '1.4' }}>
                        Toca el ícono de Compartir <span style={{fontSize: '18px'}}>⍐</span> abajo y selecciona <strong>"Agregar a inicio"</strong> ➕.
                    </p>
                </div>
            );
        };
        const CustomCalendar = ({ value, onChange, allowedTypes }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [viewDate, setViewDate] = useState(value ? new Date(value + 'T12:00:00') : new Date());
            const [showYearPicker, setShowYearPicker] = useState(false);
            const [yearPage, setYearPage] = useState(viewDate.getFullYear());
            
            const viewMonth = viewDate.getMonth();
            const viewYear = viewDate.getFullYear();

            useEffect(() => { if (!showYearPicker) setYearPage(viewDate.getFullYear()); }, [viewDate, showYearPicker]);

            const handlePrev = (e) => { e.stopPropagation(); if (showYearPicker) setYearPage(prev => prev - 12); else setViewDate(new Date(viewYear, viewMonth - 1, 1)); };
            const handleNext = (e) => { e.stopPropagation(); if (showYearPicker) setYearPage(prev => prev + 12); else setViewDate(new Date(viewYear, viewMonth + 1, 1)); };

            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const firstDay = new Date(viewYear, viewMonth, 1).getDay();
            const startOffset = (firstDay + 6) % 7; 
            const now = new Date();
            const todayString = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            const days = Array(startOffset).fill(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            const MONTH_NAMES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            return (
                <div className="relative w-full">
                    <div onClick={() => setIsOpen(true)} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer flex justify-between items-center text-slate-700 hover:bg-slate-100 transition-colors">
                        <span>{value ? value : "Seleccionar fecha..."}</span>
                        <IconCalendar size={18} />
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 mt-1 bg-white border border-slate-200 shadow-2xl rounded-xl p-4 w-72 sm:w-80 left-0">
                            <div className="fixed inset-0 z-40" onClick={(e) => { e.stopPropagation(); setIsOpen(false); setShowYearPicker(false); }}></div>
                            <div className="relative z-50">
                                <div className="flex justify-between items-center mb-4">
                                    <button type="button" onClick={handlePrev} className="p-1.5 hover:bg-slate-100 text-slate-500 rounded-lg font-bold">&lt;</button>
                                    <span onClick={(e) => { e.stopPropagation(); setShowYearPicker(!showYearPicker); }} className="font-bold text-slate-700 capitalize cursor-pointer hover:text-keralty-blue px-2 py-1 rounded hover:bg-slate-50 transition-colors">
                                        {showYearPicker ? `${yearPage - 5} - ${yearPage + 6}` : `${MONTH_NAMES[viewMonth]} ${viewYear}`}
                                    </span>
                                    <button type="button" onClick={handleNext} className="p-1.5 hover:bg-slate-100 text-slate-500 rounded-lg font-bold">&gt;</button>
                                </div>
                                {showYearPicker ? (
                                    <div className="grid grid-cols-3 gap-2">
                                        {Array.from({ length: 12 }, (_, i) => yearPage - 5 + i).map(y => (
                                            <div key={y} onClick={(e) => { e.stopPropagation(); setViewDate(new Date(y, viewMonth, 1)); setShowYearPicker(false); }} className={`h-10 flex items-center justify-center rounded text-sm font-medium cursor-pointer transition-colors ${y === viewYear ? 'bg-keralty-blue text-white shadow-sm' : 'bg-slate-50 text-slate-700 hover:bg-slate-200'}`}>{y}</div>
                                        ))}
                                    </div>
                                ) : (
                                    <>
                                        <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-bold text-slate-400"><div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div></div>
                                        <div className="grid grid-cols-7 gap-1">
                                            {days.map((day, idx) => {
                                                if (!day) return <div key={idx}></div>;
                                                const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                                const dayType = getDayType(dateStr);
                                                const isPast = dateStr < todayString;
                                                const isAllowed = allowedTypes.includes(dayType) && !isPast;
                                                
                                                let colorClasses = !isAllowed ? "bg-slate-50 text-slate-300 cursor-not-allowed opacity-40" : 
                                                    (dayType === 'festivo' ? "bg-purple-100 text-purple-800 hover:bg-purple-200 border-purple-200 border" : 
                                                    (dayType === 'domingo' ? "bg-red-100 text-red-800 hover:bg-red-200 border-red-200 border" : 
                                                    (dayType === 'sabado' ? "bg-blue-100 text-blue-800 hover:bg-blue-200 border-blue-200 border" : "bg-white text-slate-700 hover:bg-slate-100 border-slate-200 border")));

                                                if (value === dateStr) colorClasses += " ring-2 ring-keralty-blue ring-offset-1";

                                                return <div key={idx} onClick={(e) => { e.stopPropagation(); if (isAllowed) { onChange(dateStr); setIsOpen(false); } }} className={`h-8 sm:h-9 flex items-center justify-center rounded text-sm font-medium cursor-pointer transition-colors ${colorClasses}`}>{day}</div>;
                                            })}
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-slate-100 grid grid-cols-2 gap-2 text-[10px] sm:text-xs text-slate-500 font-medium">
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-white border border-slate-300 mr-1.5"></span> Hábil</div>
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-blue-300 mr-1.5"></span> Sábado</div>
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-red-300 mr-1.5"></span> Domingo</div>
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-purple-300 mr-1.5"></span> Festivo</div>
                                        </div>
                                        {allowedTypes.length < 4 && (<div className="mt-3 text-[10.5px] text-amber-700 bg-amber-50 p-2 rounded-lg flex items-start leading-tight border border-amber-100"><IconAlert size={14} className="mr-1.5 shrink-0 mt-0.5" /> El tipo de jornada seleccionada aplicó filtros de días a este calendario.</div>)}
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 4000); return () => clearTimeout(timer); }, [onClose]);
            const bgColor = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-keralty-green');
            const Icon = type === 'error' || type === 'warning' ? IconAlert : IconCheck;
            return <div className={`fixed bottom-4 right-4 ${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-2 animate-bounce-short z-50`}><Icon /><span className="font-medium">{message}</span></div>;
        };

        const ShiftEntry = ({ shift, index, updateShift, removeShift, doctorsList, isLoadingDoctors }) => {
            const isNightOrAvail = shift.type.includes("Nocturnos") || shift.type.includes("Disponibilidad");
            const currentDayType = getDayType(shift.date);
            const isSaturday = currentDayType === 'sabado';

            const getAllowedDayTypes = (shiftType) => {
                if (!shiftType) return ['habil', 'sabado', 'domingo', 'festivo'];
                if (shiftType.includes("Disponibilidad U2")) return ['domingo', 'festivo'];
                if (shiftType.includes("Disponibilidad AM") || shiftType.includes("Disponibilidad PM")) return ['habil'];
                if (shiftType.includes("Fin de semana")) return ['sabado', 'domingo', 'festivo'];
                if (shiftType.includes("Entre semana")) return ['habil'];
                return ['habil', 'sabado', 'domingo', 'festivo'];
            };
            const allowedDays = getAllowedDayTypes(shift.type);

            useEffect(() => {
                if (isNightOrAvail && shift.room !== "") updateShift(shift.id, 'room', "");
                if (shift.date && !allowedDays.includes(currentDayType)) updateShift(shift.id, 'date', "");
                if (shift.room === "Sala 7" && !isSaturday) updateShift(shift.id, 'room', "");
                
                const isRestrictedRoomSelected = ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "U"].includes(shift.room);
                if (isRestrictedRoomSelected && currentDayType && currentDayType !== 'domingo' && currentDayType !== 'festivo') updateShift(shift.id, 'room', "");
                
                const isStandardRoomSelected = ["Sala CS", "Sala 2", "Sala 3", "Sala 4", "Sala 5", "Sala 6", "Sala 8", "Sala 9"].includes(shift.room);
                if (isStandardRoomSelected && currentDayType && (currentDayType === 'domingo' || currentDayType === 'festivo')) updateShift(shift.id, 'room', "");
            }, [shift.type, shift.date, isNightOrAvail, currentDayType]);

            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-4 transition-all hover:shadow-md">
                    <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-50">
                        <h4 className="font-semibold text-keralty-blue flex items-center"><span className="text-keralty-green mr-2"><IconActivity /></span>Cambio de Turno #{index + 1}</h4>
                        {index > 0 && <button onClick={() => removeShift(shift.id)} className="text-red-400 hover:text-red-600 p-1 rounded-full hover:bg-red-50 transition-colors"><IconTrash /></button>}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconUser /></span> Persona Asignada</label>
                            <div className="relative">
                                <select value={shift.person} onChange={(e) => updateShift(shift.id, 'person', e.target.value)} className="w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue appearance-none text-slate-700">
                                    <option value="">{isLoadingDoctors ? "Cargando..." : "Seleccione..."}</option>
                                    {doctorsList.map((doc, i) => <option key={i} value={doc}>{doc}</option>)}
                                </select>
                                <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></span>
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconClock /></span> Tipo de Jornada</label>
                            <div className="relative">
                                <select value={shift.type} onChange={(e) => updateShift(shift.id, 'type', e.target.value)} className="w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue appearance-none text-slate-700">
                                    <option value="">Seleccione jornada...</option>
                                    {Object.entries(SHIFT_TYPES).map(([cat, types]) => <optgroup key={cat} label={cat}>{types.map(t => <option key={t} value={`${cat} - ${t}`}>{t}</option>)}</optgroup>)}
                                </select>
                                <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></span>
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconCalendar /></span> Fecha del Turno</label>
                            <CustomCalendar value={shift.date} onChange={(date) => updateShift(shift.id, 'date', date)} allowedTypes={allowedDays} />
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-medium text-slate-600 flex items-center"><span className="text-slate-400 mr-1"><IconLayout /></span> Sala Asignada</label>
                            <div className="relative">
                                <select value={shift.room} onChange={(e) => updateShift(shift.id, 'room', e.target.value)} disabled={isNightOrAvail} className={`w-full pl-3 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue appearance-none text-slate-700 ${isNightOrAvail ? 'opacity-50 cursor-not-allowed bg-slate-200' : ''}`}>
                                    <option value="">{isNightOrAvail ? "No aplica" : "Seleccione sala..."}</option>
                                    {Object.entries(ROOMS_GROUPED).map(([groupName, rooms]) => (
                                        <optgroup key={groupName} label={groupName}>
                                            {rooms.map((room, i) => {
                                                const isSala7 = room === "Sala 7";
                                                const isSundayOrHoliday = currentDayType === 'domingo' || currentDayType === 'festivo';
                                                const isRestrictedRoom = ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "U"].includes(room);
                                                const isStandardRoom = ["Sala CS", "Sala 2", "Sala 3", "Sala 4", "Sala 5", "Sala 6", "Sala 8", "Sala 9"].includes(room);
                                                
                                                let isDisabled = false; let disabledReason = "";
                                                if (isSala7 && !isSaturday) { isDisabled = true; disabledReason = "(Solo Sábados)"; }
                                                else if (isStandardRoom && isSundayOrHoliday) { isDisabled = true; disabledReason = "(No disp. Dom/Fest)"; }
                                                else if (isRestrictedRoom && !isSundayOrHoliday) { isDisabled = true; disabledReason = "(Solo Dom/Fest)"; }
                                                
                                                return <option key={`${groupName}-${i}`} value={room} disabled={isDisabled}>{room} {disabledReason}</option>
                                            })}
                                        </optgroup>
                                    ))}
                                </select>
                                <span className="absolute right-3 top-3 text-slate-400 pointer-events-none"><IconChevronDown /></span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', password: '' });
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordData, setPasswordData] = useState({ old: '', new: '', confirm: '' });
            const [showEmailLogin, setShowEmailLogin] = useState(false);
            
            const [shifts, setShifts] = useState([{ id: '1', person: '', type: '', date: '', room: '' }]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [validationError, setValidationError] = useState("");
            const [toast, setToast] = useState(null);
            const [history, setHistory] = useState([]);
            const [doctorsList, setDoctorsList] = useState([]);
            const [isLoadingDoctors, setIsLoadingDoctors] = useState(true);
            const [isPendingApproval, setIsPendingApproval] = useState(false);
            
            const parseJwt = (token) => { try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; } };

            useEffect(() => {
                if (user || authMode !== 'login' || isPendingApproval) return;
                
                const initGoogleSignIn = () => {
                    if (window.google && document.getElementById("googleSignInDiv")) {
                        window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleResponse });
                        window.google.accounts.id.renderButton(document.getElementById("googleSignInDiv"), { theme: "outline", size: "large", width: "100%", shape: "rectangular" });
                    }
                };
                
                const scriptId = 'google-gsi-client';
                if (!document.getElementById(scriptId)) {
                    const script = document.createElement('script'); script.id = scriptId; script.src = 'https://accounts.google.com/gsi/client'; script.async = true; script.onload = initGoogleSignIn;
                    document.body.appendChild(script);
                } else { setTimeout(initGoogleSignIn, 100); }
            }, [user, authMode, isPendingApproval]);

            useEffect(() => {
                const fetchDoctors = async () => {
                    setIsLoadingDoctors(true);
                    try {
                        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDoctors`);
                        const result = await response.json();
                        if (result.status === 'success') setDoctorsList(result.data);
                        else throw new Error(result.message);
                    } catch (error) {
                        setDoctorsList(FALLBACK_DOCTORS);
                        setToast({ message: "No se pudo conectar a Sheets. Usando lista temporal.", type: "warning" });
                    } finally { setIsLoadingDoctors(false); }
                };
                fetchDoctors();
            }, []);

            const handleGoogleResponse = async (response) => {
                setIsLoggingIn(true);
                try {
                    const payload = parseJwt(response.credential);
                    if (payload && payload.email) {
                        const params = new URLSearchParams({
                            action: 'googleAuth',
                            email: payload.email,
                            name: payload.name,
                            photoUrl: payload.picture || ""
                        });
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
                        const result = await res.json();

                        if (result.status === 'success') {
                            setUser(result.user);
                        } else if (result.status === 'pending' || (result.message && result.message.includes('pendiente'))) {
                            setIsPendingApproval(true);
                            if (window.google) window.google.accounts.id.disableAutoSelect();
                        } else {
                            setToast({ message: result.message || "No autorizado.", type: "warning" });
                            if (window.google) window.google.accounts.id.disableAutoSelect();
                        }
                    } else {
                        setToast({ message: "No se pudo extraer la información de Google.", type: "error" });
                    }
                } catch (error) { 
                    setToast({ message: "Error de conexión con el servidor.", type: "error" });
                } finally { 
                    setIsLoggingIn(false); 
                }
            };

            const handleEmailLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    const params = new URLSearchParams({
                        action: 'login',
                        email: formData.email,
                        password: formData.password
                    });
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
                    const result = await response.json();

                    if (result.status === 'success') {
                        setUser(result.user);
                    } else if (result.status === 'pending' || (result.message && result.message.includes('pendiente'))) {
                        setIsPendingApproval(true);
                    } else {
                        setToast({ message: result.message || "Credenciales incorrectas.", type: "error" });
                    }
                } catch (error) {
                    setToast({ message: "Error de conexión con el servidor.", type: "error" });
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    const params = new URLSearchParams({ action: 'resetPassword', email: formData.email });
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
                    const result = await response.json();

                    if (result.status === 'success') {
                        setToast({ message: "Se ha enviado una nueva contraseña a tu correo.", type: "success" });
                        setAuthMode('login');
                        setShowEmailLogin(false);
                        setFormData({ name: '', email: '', phone: '', password: '' });
                    } else {
                        setToast({ message: result.message || "Error al restablecer contraseña.", type: "error" });
                    }
                } catch (error) {
                    setToast({ message: "Error de conexión con el servidor.", type: "error" });
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    const params = new URLSearchParams({
                        action: 'register',
                        name: formData.name,
                        email: formData.email,
                        phone: formData.phone,
                        password: formData.password
                    });
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
                    const result = await response.json();

                    if (result.status === 'success' || result.status === 'pending') {
                        setIsPendingApproval(true);
                    } else {
                        setToast({ message: result.message || "Error al crear cuenta.", type: "error" });
                    }
                } catch (error) {
                    setToast({ message: "Error de conexión con el servidor.", type: "error" });
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                if (passwordData.new !== passwordData.confirm) return setToast({ message: "Las contraseñas nuevas no coinciden.", type: "error" });
                if (passwordData.new.length < 6) return setToast({ message: "La nueva contraseña debe tener al menos 6 caracteres.", type: "error" });
                
                setIsSubmitting(true);
                try {
                    const params = new URLSearchParams({
                        action: 'changePassword',
                        email: user.email,
                        oldPassword: passwordData.old,
                        newPassword: passwordData.new
                    });
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);
                    const result = await response.json();

                    if (result.status === 'success') {
                        setToast({ message: "Contraseña actualizada exitosamente.", type: "success" });
                        setShowPasswordModal(false);
                        setPasswordData({ old: '', new: '', confirm: '' });
                    } else {
                        setToast({ message: result.message || "Error al actualizar contraseña.", type: "error" });
                    }
                } catch (error) {
                    setToast({ message: "Error de conexión con el servidor.", type: "error" });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleLogout = () => { 
                setUser(null); setShifts([{ id: '1', person: '', type: '', date: '', room: '' }]); setFormData({ name: '', email: '', phone: '', password: '' }); setValidationError(""); setShowEmailLogin(false);
                if (window.google) window.google.accounts.id.disableAutoSelect();
            };
            const addShift = () => { setValidationError(""); setShifts([...shifts, { id: Date.now().toString(), person: '', type: '', date: '', room: '' }]); };
            const removeShift = (id) => { setValidationError(""); setShifts(shifts.filter(s => s.id !== id)); };
            const updateShift = (id, field, value) => { setValidationError(""); setShifts(shifts.map(s => s.id === id ? { ...s, [field]: value } : s)); };

            const handleSubmit = async () => {
                const isValid = shifts.every(s => s.person && s.type && s.date && (s.type.includes("Nocturnos") || s.type.includes("Disponibilidad") || s.room));
                if (!isValid) {
                    setValidationError("⚠️ Faltan campos por diligenciar en uno o más turnos.");
                    return setToast({ message: "Completa todos los campos obligatorios.", type: "error" });
                }
                setValidationError("");
                setIsSubmitting(true);
                try {
                    const payload = {
                        solicitante: user.name, correoSolicitante: user.email,
                        cambios: shifts.map(s => ({ persona: s.person, jornada: s.type, fecha: s.date, sala: (s.type.includes("Nocturnos") || s.type.includes("Disponibilidad")) ? "N/A" : s.room, timestamp: new Date().toISOString() }))
                    };
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const newHistory = payload.cambios.map(c => ({...c, estado: 'Registrado', fechaRegistro: new Date().toLocaleDateString()}));
                    setHistory(prev => [...newHistory, ...prev]);
                    setToast({ message: "Solicitudes guardadas correctamente.", type: "success" });
                    setShifts([{ id: Date.now().toString(), person: '', type: '', date: '', room: '' }]); 
                } catch (error) { setToast({ message: "Error al guardar.", type: "error" });
                } finally { setIsSubmitting(false); }
            };

            if (isPendingApproval) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border-t-4 border-amber-400 animate-fade-in">
                            <div className="mx-auto w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mb-6">
                                <IconClock size={32} />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-4">Autorización Pendiente</h2>
                            <p className="text-slate-600 mb-6 leading-relaxed">
                                Tu cuenta ha sido registrada correctamente. <strong className="text-slate-800 block mt-2">Una vez el administrador le dé acceso se le enviará un correo indicando que ya puede entrar.</strong>
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl shadow-sm text-sm font-medium text-slate-700 bg-slate-50 hover:bg-slate-200 border border-slate-200 transition-colors">
                                <IconRefresh size={18} className="mr-2" /> Recargar página
                            </button>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border-t-4 border-keralty-green transition-all">
                            <img src="https://lh3.googleusercontent.com/d/1R09YUf7Fk8OS4nA2603qtIsEqRr9CxXb" alt="Keralty" className="h-12 mx-auto mb-6 object-contain" />
                            <h2 className="text-3xl font-bold text-keralty-blue">Ayudantes CUC/PA</h2>
                            <p className="text-slate-500 mt-2 mb-6">Portal de Gestión Cambios de Turno</p>
                            
                            {authMode === 'register' ? (
                                <form onSubmit={handleRegister} className="space-y-4 text-left animate-fade-in">
                                    <h3 className="font-bold text-lg text-slate-700 text-center mb-4">Crear una cuenta nueva</h3>
                                    <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconUser size={16} className="mr-1"/> Nombre completo</label><input required type="text" placeholder="Ej. Juan Pérez" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                    <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconMail size={16} className="mr-1"/> Correo electrónico</label><input required type="email" placeholder="juan@ejemplo.com" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                    <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconPhone size={16} className="mr-1"/> Teléfono celular</label><input required type="tel" placeholder="300 123 4567" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                    <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconLock size={16} className="mr-1"/> Contraseña</label><input required minLength="6" type="password" placeholder="••••••••" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                    <button type="submit" disabled={isLoggingIn} className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl shadow-sm text-sm font-medium text-white bg-keralty-green hover:opacity-90 transition-opacity disabled:opacity-70 mt-6">{isLoggingIn ? <IconRefresh className="animate-spin mr-2" /> : null} Crear cuenta e ingresar</button>
                                    <p className="text-sm text-center text-slate-500 mt-4">¿Ya tienes cuenta? <button type="button" onClick={() => { setAuthMode('login'); setFormData({ name: '', email: '', phone: '', password: '' }); setShowEmailLogin(false); }} className="text-keralty-blue font-semibold hover:underline focus:outline-none">Inicia sesión</button></p>
                                </form>
                            ) : authMode === 'forgot' ? (
                                <form onSubmit={handleResetPassword} className="space-y-4 text-left animate-fade-in">
                                    <h3 className="font-bold text-lg text-slate-700 text-center mb-2">Recuperar contraseña</h3>
                                    <p className="text-sm text-slate-500 text-center mb-4">Ingresa tu correo y te enviaremos una contraseña temporal nueva.</p>
                                    <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconMail size={16} className="mr-1"/> Correo electrónico</label><input required type="email" placeholder="correo@ejemplo.com" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                    <button type="submit" disabled={isLoggingIn} className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl shadow-sm text-sm font-medium text-white bg-amber-500 hover:bg-amber-600 transition-colors disabled:opacity-70 mt-6">{isLoggingIn ? <IconRefresh className="animate-spin mr-2" /> : null} Enviar nueva contraseña</button>
                                    <p className="text-sm text-center text-slate-500 mt-4"><button type="button" onClick={() => { setAuthMode('login'); setFormData({ name: '', email: '', phone: '', password: '' }); setShowEmailLogin(false); }} className="text-keralty-blue font-semibold hover:underline focus:outline-none">Volver al inicio de sesión</button></p>
                                </form>
                            ) : (
                                <div className="space-y-5 animate-fade-in">
                                    <div className="bg-blue-50 p-4 rounded-lg text-sm text-keralty-blue text-left border border-blue-100"><p className="font-semibold mb-1 flex items-center"><IconAlert /> <span className="ml-2">Acceso Restringido</span></p>Inicia sesión para acceder al sistema.</div>
                                    <div className="flex justify-center min-h-[44px]">
                                        {isLoggingIn ? <button disabled className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl shadow-sm text-sm font-medium text-white bg-slate-400"><IconRefresh className="animate-spin mr-2" /> Validando...</button> : <div id="googleSignInDiv" className="w-full flex justify-center"></div>}
                                    </div>
                                    
                                    {!showEmailLogin ? (
                                        <div className="relative flex items-center py-6 cursor-pointer group" onClick={() => setShowEmailLogin(true)}>
                                            <div className="flex-grow border-t border-slate-200 transition-colors group-hover:border-slate-300"></div>
                                            <span className="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase font-semibold tracking-wider transition-colors group-hover:text-keralty-blue flex items-center">
                                                O con tu correo
                                                <span className="ml-1"><IconChevronDown size={14} /></span>
                                            </span>
                                            <div className="flex-grow border-t border-slate-200 transition-colors group-hover:border-slate-300"></div>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="relative flex items-center py-2">
                                                <div className="flex-grow border-t border-slate-200"></div>
                                                <span className="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase font-semibold tracking-wider">iniciar sesión con correo</span>
                                                <div className="flex-grow border-t border-slate-200"></div>
                                            </div>
                                            <form onSubmit={handleEmailLogin} className="space-y-4 text-left animate-fade-in">
                                                <div><label className="text-sm font-medium text-slate-600 flex items-center"><IconMail size={16} className="mr-1"/> Correo electrónico</label><input required type="email" placeholder="correo@ejemplo.com" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" /></div>
                                                <div>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <label className="text-sm font-medium text-slate-600 flex items-center"><IconLock size={16} className="mr-1"/> Contraseña</label>
                                                        <button type="button" onClick={() => { setAuthMode('forgot'); setFormData({ name: '', email: '', phone: '', password: '' }); }} className="text-xs text-keralty-blue font-semibold hover:underline focus:outline-none">¿Olvidaste tu contraseña?</button>
                                                    </div>
                                                    <input required type="password" placeholder="••••••••" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" />
                                                </div>
                                                <button type="submit" disabled={isLoggingIn} className="w-full flex items-center justify-center py-3.5 px-4 rounded-xl shadow-sm text-sm font-medium text-white bg-keralty-blue hover:bg-blue-900 transition-colors disabled:opacity-70">{isLoggingIn ? <IconRefresh className="animate-spin mr-2" /> : null} Ingresar</button>
                                            </form>
                                            <p className="text-sm text-center text-slate-500 mt-4 animate-fade-in">¿No tienes cuenta? <button type="button" onClick={() => { setAuthMode('register'); setFormData({ name: '', email: '', phone: '', password: '' }); setShowEmailLogin(false); }} className="text-keralty-green font-semibold hover:underline focus:outline-none">Regístrate aquí</button></p>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                        {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                        
                        <IosInstallPrompt />
                    </div>
                );
            }

            return (
                <div className="pb-10">
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b-[3px] border-keralty-green">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <img src="https://lh3.googleusercontent.com/d/1R09YUf7Fk8OS4nA2603qtIsEqRr9CxXb" alt="Keralty Logo" className="h-8 object-contain" />
                                <div className="h-8 w-[1px] bg-slate-200 hidden sm:block"></div>
                                <h1 className="text-xl font-bold text-keralty-blue hidden sm:block">Gestión Cambios de Turno</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="hidden md:block text-right"><p className="text-sm font-medium text-keralty-blue">{user.name}</p></div>
                                <div className="h-10 w-10 bg-blue-50 text-keralty-blue rounded-full flex items-center justify-center overflow-hidden border border-blue-100">
                                    {user.photoUrl ? <img src={user.photoUrl} alt="Perfil" className="w-full h-full object-cover" /> : <IconUserCircle />}
                                </div>
                                {!user.photoUrl && (
                                    <button onClick={() => setShowPasswordModal(true)} title="Cambiar contraseña" className="text-slate-400 hover:text-keralty-blue transition-colors">
                                        <IconKey />
                                    </button>
                                )}
                                <button onClick={handleLogout} title="Cerrar sesión" className="text-slate-400 hover:text-red-600 transition-colors"><IconLogOut /></button>
                            </div>
                        </div>
                    </header>

                    {/* Modal para cambiar contraseña */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in">
                                <div className="bg-keralty-blue px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-white font-semibold flex items-center"><IconKey size={18} className="mr-2"/> Cambiar Contraseña</h3>
                                    <button onClick={() => setShowPasswordModal(false)} className="text-slate-300 hover:text-white text-2xl leading-none">×</button>
                                </div>
                                <form onSubmit={handleChangePassword} className="p-6 space-y-4">
                                    <div>
                                        <label className="text-sm font-medium text-slate-600 block mb-1">Contraseña Actual</label>
                                        <input required type="password" value={passwordData.old} onChange={e => setPasswordData({...passwordData, old: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-medium text-slate-600 block mb-1">Nueva Contraseña</label>
                                        <input required minLength="6" type="password" value={passwordData.new} onChange={e => setPasswordData({...passwordData, new: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-medium text-slate-600 block mb-1">Confirmar Nueva Contraseña</label>
                                        <input required minLength="6" type="password" value={passwordData.confirm} onChange={e => setPasswordData({...passwordData, confirm: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-keralty-blue outline-none" />
                                    </div>
                                    <div className="pt-2 flex space-x-3">
                                        <button type="button" onClick={() => setShowPasswordModal(false)} className="flex-1 py-2.5 rounded-lg font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
                                        <button type="submit" disabled={isSubmitting} className="flex-1 py-2.5 rounded-lg font-medium text-white bg-keralty-green hover:opacity-90 transition-opacity disabled:opacity-70 flex justify-center items-center">
                                            {isSubmitting ? <IconRefresh className="animate-spin h-5 w-5" /> : "Guardar"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <main className="max-w-5xl mx-auto px-4 mt-8 space-y-8">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-visible">
                            <div className="bg-keralty-blue px-6 py-4 flex items-center rounded-t-xl"><span className="text-keralty-green mr-2"><IconFileText /></span><h2 className="text-lg font-semibold text-white">Nuevas Solicitudes</h2></div>
                            <div className="p-6 bg-slate-50 rounded-b-xl">
                                {shifts.map((shift, idx) => <ShiftEntry key={shift.id} shift={shift} index={idx} updateShift={updateShift} removeShift={removeShift} doctorsList={doctorsList} isLoadingDoctors={isLoadingDoctors}/>)}
                                <div className="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0">
                                    <button onClick={addShift} className="flex items-center text-keralty-blue font-medium px-4 py-2 border border-dashed border-keralty-blue hover:bg-blue-50 rounded-lg justify-center transition-colors"><span className="mr-1"><IconPlus /></span> Agregar otro</button>
                                    <div className="flex flex-col items-end w-full sm:w-auto">
                                        {validationError && <div className="text-red-500 text-sm font-bold mb-2 animate-bounce-short">{validationError}</div>}
                                        <button onClick={handleSubmit} disabled={isSubmitting} className="w-full sm:w-auto flex items-center justify-center px-6 py-3 rounded-xl font-medium text-white bg-keralty-green hover:opacity-90 transition-opacity">
                                            {isSubmitting ? <IconRefresh className="animate-spin mr-2" /> : <span className="mr-2"><IconSave /></span>} Guardar Solicitudes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {history.length > 0 && (
                            <section>
                                <h3 className="text-lg font-bold text-keralty-blue mb-4 flex items-center"><span className="text-keralty-green mr-2"><IconClock /></span> Mis Solicitudes</h3>
                                <div className="bg-white shadow-sm rounded-xl border border-slate-200 overflow-x-auto">
                                    <table className="min-w-full divide-y divide-slate-200">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Fecha Turno</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Profesional</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Jornada</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Sala</th>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {history.map((entry, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50">
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{entry.fecha}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-700">{entry.persona}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{entry.jornada}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500"><span className="bg-slate-100 px-2 py-1 rounded font-medium">{entry.sala}</span></td>
                                                    <td className="px-6 py-4 whitespace-nowrap"><span className="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">{entry.estado}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
